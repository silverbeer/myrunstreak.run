name: Backend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/shared/**'
      - 'helm/myrunstreak/**'
      - '.github/workflows/backend-deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/silverbeer/myrunstreak-backend

# Serialize deploys so two near-simultaneous merges don't race on the Helm
# image-tag commit (non-fast-forward push). Queue, don't cancel — each image
# builds and the later merge's tag wins (SB-300).
concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so the pre-commit rebase can fast-forward onto main
          # (also covers reruns whose base has drifted).
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Same architecture as the frontend / cluster nodes (linux/amd64).
          platforms: linux/amd64

      - name: Update Helm values image tag
        # Pull latest main FIRST (clean fast-forward — no local edits yet), THEN
        # edit the tag. Order matters: sed-then-rebase conflicts when a prior
        # deploy already changed this same line (SB-300 v2). Pull-then-sed never
        # conflicts, so the auto-commit below always fast-forwards.
        run: |
          git pull --ff-only origin main
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|tag: \".*\" # backend-tag|tag: \"${SHORT_SHA}\" # backend-tag|" helm/myrunstreak/values.yaml

      - name: Commit updated Helm values
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "ci: update myrunstreak-backend image tag to ${{ github.sha }} [skip ci]"
          file_pattern: helm/myrunstreak/values.yaml
