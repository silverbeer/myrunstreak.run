name: Backend Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'src/shared/**'
      - '.github/workflows/backend-test.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'src/shared/**'
      - '.github/workflows/backend-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --project backend --all-extras

      - name: Ruff lint
        run: uv run --project backend ruff check backend/

      - name: Run tests
        run: uv run --project backend python -m pytest backend/tests/ -v

      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t myrunstreak-backend:test .
