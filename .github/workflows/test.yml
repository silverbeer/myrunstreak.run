name: Tests

# Full suite gate (SB-173): runs the root AND backend test suites on every PR.
# Previously only backend/tests ran in CI, so the root suite (planning engine,
# splits, models, CLI, oauth — ~50 tests) could break without CI noticing.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root:
    name: Root suite (src/shared, cli, planning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Ruff lint
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Run tests
        run: uv run pytest tests/ -q

  backend:
    name: Backend suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --project backend --all-extras
      - name: Ruff lint
        run: uv run --project backend ruff check backend/
      - name: Ruff format check
        run: uv run --project backend ruff format --check backend/
      - name: Run tests
        run: uv run --project backend python -m pytest backend/tests/ -q
      - name: Build Docker image
        run: docker build -f backend/Dockerfile -t myrunstreak-backend:test .

  cli:
    name: stk CLI (lint + install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - name: Set up Python
        run: uv python install 3.12
      - name: Ruff lint
        run: uv run --project stk ruff check stk/
      - name: Ruff format check
        run: uv run --project stk ruff format --check stk/
      - name: Install + smoke test the console script
        run: |
          uv tool install ./stk
          stk --version
