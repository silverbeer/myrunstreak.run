replicaCount: 2

image:
  repository: ghcr.io/silverbeer/myrunstreak-frontend
  tag: "9e11dd7" # frontend-tag
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: nginx
  hosts:
    - myrunstreak.run
    - www.myrunstreak.run
  # API host(s) routed to the FastAPI backend (only used when backend.enabled).
  apiHosts:
    - api.myrunstreak.run
  tls:
    secretName: myrunstreak-tls

env: []

# ============================================================================
# ExternalSecret (AWS Secrets Manager → k8s Secret via ESO)
# ============================================================================
# Replaces the previously-out-of-band ExternalSecret applied via kubectl from
# missingtable-platform-bootstrap. Now ArgoCD-managed via this chart.
externalSecret:
  enabled: true
  refreshInterval: 1h
  secretStoreName: aws-secrets-manager
  awsSecretName: myrunstreak-app-secrets
  targetName: myrunstreak-secrets

# ============================================================================
# Backend (FastAPI) — disabled by default; toggle on per-env as the LKE
# migration rolls out.
# ============================================================================
backend:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 3

  image:
    repository: ghcr.io/silverbeer/myrunstreak-backend
    tag: "9e11dd7" # backend-tag
    pullPolicy: IfNotPresent

  env:
    environment: dev
    logLevel: INFO
    corsAllowOrigins: "*"
    cacheEnabled: "true"
    cacheDefaultTtlSeconds: 60
    # Comma-separated user UUIDs allowed to issue invites (SB-188). Set the
    # owner's UUID here to enable invite issuance; empty = disabled.
    adminUserIds: "16eb502d-7fc0-4fce-9107-9931df747e28"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  cronjobs:
    sync:
      enabled: true
      # 14:00 + 17:00 UTC matches the EventBridge schedule we're replacing.
      schedule: "0 14,17 * * *"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    publishStatus:
      enabled: true
      # Every 15 min — matches what AWS EventBridge ran. The bucket itself
      # has Cache-Control: max-age=300, so consumers never see > 5 min of
      # extra staleness on top of the publish cadence.
      schedule: "*/15 * * * *"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    recomputePlans:
      enabled: true
      # 08:00 UTC (~03:00-04:00 ET) — after the day rolls over and the morning
      # SmashRun sync, so the day's plan reflects yesterday's runs. The plan is a
      # derived cache; this rebuilds it (SB-164).
      schedule: "0 8 * * *"
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi

# ============================================================================
# Redis (cache for backend stats endpoints) — disabled by default
# ============================================================================
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  maxmemory: "128mb"
  persistence:
    size: 1Gi
    storageClass: ""  # default storage class
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi
