replicaCount: 2

image:
  repository: ghcr.io/silverbeer/myrunstreak-frontend
  tag: "6b1e9a1" # frontend-tag
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 80

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 5

ingress:
  enabled: true
  className: nginx
  hosts:
    - myrunstreak.run
    - www.myrunstreak.run
  tls:
    secretName: myrunstreak-tls

env: []
