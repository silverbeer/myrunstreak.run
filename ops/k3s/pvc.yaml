# Namespace + a tiny PVC that holds the stk session (session.json). The CronJob
# and the one-time login pod both mount it, so the rotated refresh token
# persists across ticks. SB-184.
apiVersion: v1
kind: Namespace
metadata:
  name: myrunstreak
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stk-session
  namespace: myrunstreak
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path # k3s default provisioner
  resources:
    requests:
      storage: 16Mi
